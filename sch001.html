<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>School Dashboard</title>
</head>
<body>

  <h1 id="schoolName">School Name</h1>

  <form id="subjectForm">
    <select id="cadre">
      <option value="Teacher">Teacher</option>
      <option value="Admin">Admin</option>
    </select>

    <input type="text" id="subject" placeholder="Enter Subject" required>
    <input type="password" id="subjectPassword" placeholder="Subject Password" required>

    <button type="submit">Access Subject</button>
  </form>

  <script src="school.js"></script>
</body>
</html>
