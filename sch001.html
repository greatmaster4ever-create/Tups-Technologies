<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tender Lilies Royal Academy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000066">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="school.css">

  <!-- SUPABASE -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body>

  <div class="container">

    <h1>Tender Lilies Royal Academy</h1>

    <form id="subjectForm">

      <!-- CADRE -->
      <label>Access Type</label>
      <select id="cadre" required>
        <option value="Teacher">Teacher</option>
        <option value="Admin">Admin</option>
      </select>

      <!-- SUBJECT -->
      <label>Subject</label>
      <input 
        type="text" 
        id="subject" 
        placeholder="Enter Subject (e.g Mathematics)" 
        required
      >

      <!-- PASSWORD -->
      <label>Subject Password</label>

      <div class="password-box">
        <input 
          type="password" 
          id="subjectPassword" 
          placeholder="Enter Subject Password" 
          required
        >
        <span class="eye" onclick="togglePassword()">👁</span>
      </div>

      <button type="submit">Access Subject</button>

    </form>

  </div>

  <!-- JS -->
  <script src="school.js"></script>
  
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js')
  .then(() => console.log("SW Registered"))
  .catch(err => console.log("SW Failed", err));
}
</script>
</body>
</html>
