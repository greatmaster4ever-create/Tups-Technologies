<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tender Lilies Royal Academy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(rgba(0,0,50,0.6), rgba(0,0,50,0.6)),
                  url('https://images.unsplash.com/photo-1580587771525-78b9dba3b914') no-repeat center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      width: 90%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .logo {
      width: 80px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 20px;
      color: #fff;
    }

    select, input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    select {
      background: #800000;
      color: white;
    }

    input {
      background: rgba(255,255,255,0.9);
    }

    .password-container {
      position: relative;
    }

    .eye {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #333;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #800000, #000080);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.85;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.8;
    }
  </style>

</head>

<body>

  <div class="container">
    <!-- LOGO -->
    <img src="logo.JPG" class="logo" alt="School Logo">
